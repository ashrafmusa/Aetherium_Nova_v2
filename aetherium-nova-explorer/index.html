
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aetherium Nova | Next-Generation Blockchain</title>
    <meta name="description" content="Aetherium Nova — Post-Quantum Secure, Decentralized Blockchain Platform with Hybrid PoSU Consensus." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              cyber: {
                50: '#ecfffe',
                100: '#cffbfe',
                200: '#a5f3fc',
                300: '#67e8f9',
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
                700: '#0e7490',
                800: '#155e75',
                900: '#164e63',
              },
              electric: {
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'float': 'float 6s ease-in-out infinite',
              'scan': 'scan 3s linear infinite',
              'count-up': 'count-up 0.6s ease-out',
              'slide-in-up': 'slideInUp 0.4s ease-out',
              'slide-in-right': 'slideInRight 0.3s ease-out',
              'fade-in': 'fadeIn 0.5s ease-out',
              'border-flow': 'borderFlow 4s linear infinite',
              'flicker': 'flicker 8s linear infinite',
            },
            keyframes: {
              glow: {
                '0%': { textShadow: '0 0 10px #22d3ee, 0 0 20px #22d3ee' },
                '100%': { textShadow: '0 0 20px #22d3ee, 0 0 40px #22d3ee, 0 0 60px #22d3ee' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100vh)' },
              },
              slideInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideInRight: {
                '0%': { opacity: '0', transform: 'translateX(-20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              borderFlow: {
                '0%, 100%': { borderColor: '#22d3ee' },
                '50%': { borderColor: '#6366f1' },
              },
              flicker: {
                '0%, 95%, 100%': { opacity: '1' },
                '96%': { opacity: '0.8' },
                '97%': { opacity: '1' },
                '98%': { opacity: '0.7' },
                '99%': { opacity: '1' },
              },
            },
            boxShadow: {
              'glow-cyan': '0 0 20px rgba(34, 211, 238, 0.4)',
              'glow-cyan-lg': '0 0 40px rgba(34, 211, 238, 0.3)',
              'glow-indigo': '0 0 20px rgba(99, 102, 241, 0.4)',
              'glow-green': '0 0 20px rgba(34, 197, 94, 0.4)',
            },
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-mono, code, pre, .terminal {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #22d3ee40; }
      /* Cyber grid background */
      .cyber-grid {
        background-image:
          linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      /* Glow button */
      .btn-cyber {
        position: relative;
        overflow: hidden;
      }
      .btn-cyber::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s;
      }
      .btn-cyber:hover::before {
        left: 100%;
      }
      /* Card hover glow */
      .card-cyber {
        transition: all 0.3s ease;
      }
      .card-cyber:hover {
        box-shadow: 0 0 30px rgba(34,211,238,0.15);
        border-color: rgba(34,211,238,0.5) !important;
      }
      /* Input glow focus */
      .input-cyber:focus {
        box-shadow: 0 0 0 2px rgba(34,211,238,0.3);
        border-color: #22d3ee !important;
        outline: none;
      }
      /* Scan line effect */
      .scanline-container {
        position: relative;
        overflow: hidden;
      }
      .scanline-container::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(34,211,238,0.4), transparent);
        animation: scan 4s linear infinite;
        pointer-events: none;
      }
      /* Gradient text */
      .text-gradient-cyber {
        background: linear-gradient(135deg, #22d3ee, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .text-gradient-glow {
        background: linear-gradient(135deg, #67e8f9, #22d3ee, #6366f1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      /* Particle dots */
      .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(34,211,238,0.6);
        animation: float 6s ease-in-out infinite;
      }
      /* Terminal cursor blink */
      .cursor-blink {
        animation: blink 1.2s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      /* Neon border */
      .border-neon {
        border: 1px solid rgba(34,211,238,0.3);
        box-shadow: inset 0 0 20px rgba(34,211,238,0.05);
      }
      /* Hash text */
      .hash-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        letter-spacing: -0.02em;
      }
      /* Animate new items entering table */
      @keyframes newItemPulse {
        0% { background-color: rgba(34,211,238,0.15); }
        100% { background-color: transparent; }
      }
      .new-item {
        animation: newItemPulse 1.5s ease-out forwards;
      }
      /* Progress bar shine */
      @keyframes barShine {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .progress-shine {
        background: linear-gradient(90deg, #06b6d4, #6366f1, #22d3ee, #06b6d4);
        background-size: 200% 100%;
        animation: barShine 3s linear infinite;
      }
    </style>
